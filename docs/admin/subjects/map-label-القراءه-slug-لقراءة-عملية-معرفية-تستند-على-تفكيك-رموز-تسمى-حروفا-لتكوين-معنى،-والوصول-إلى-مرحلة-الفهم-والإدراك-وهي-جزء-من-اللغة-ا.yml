label: القراءه
slug: لقراءة عملية معرفية تستند على تفكيك رموز تسمى حروفا لتكوين معنى، والوصول
  إلى مرحلة الفهم والإدراك. وهي جزء من اللغة التي هي وسيلة للتواصل أو الفهم.
  وتتكون اللغة من حروف وأرقام ورموز معروفة ومتداولة للتواصل بين الناس. فالقراءة
  هي وسيلة استقبال معلومات الكاتب أو المرسل للرسالة واستشعار المعنى المطلوب، وهي
  وسيلة للتعلم والتواصل مع الثقافات والحضارات عن طريق استرجاع المعلومات المسجلة
  في المخ، والمعلمة من قبل على شكل حروف وأرقام ورموز وأشياء أخرى مثل طريقة برايل
  للقراءة للمكفوفين. وتوجد أنواع أخرى للقراءة غير التي في اللغة مثل قراءة
  النوتات الموسيقية أو الصور التوضيحية. وفي مصطلحات علم الحاسوب، فإن القراءة هي
  استرجاع معلومات من أماكن تخزينها على الحاسوب كالأقراص الصلبة والمرنة وغيرها.
