<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>لوحة التحكم | جمال خلف</title>
    <style>
      /* 1. Global RTL Reset for Decap CMS UI */
      body {
        direction: rtl !important;
      }

      /* 2. Fix the Sidebar (Aside) Position */
      aside {
        left: auto !important;
        right: 0 !important;
        border-right: none !important;
        border-left: 1px solid #dfe3e6; /* Moves the divider border to the left side */
      }

      /* 3. Fix the Main Content Area */
      main {
        padding-left: 0 !important;
        padding-right: 280px !important; /* Matches default CMS sidebar width */
      }

      /* 4. Fix specific UI components inside collections */
      /* Prevents collection cards and headers from overflowing or covering each other */
      main > div {
        direction: rtl !important;
      }

      /* Smooth out the top navigation/header bar spacing */
      header {
        left: 0 !important;
        right: 280px !important;
        width: calc(100% - 280px) !important;
      }
      
      /* Quick fix for search & filter alignment inside the toolbar */
      div[class*="Toolbar"] {
        padding-left: 16px !important;
        padding-right: 16px !important;
      }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
