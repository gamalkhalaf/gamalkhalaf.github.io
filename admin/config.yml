backend:
  name: git-gateway
  branch: main

media_folder: "docs/assets/images"
public_folder: "/assets/images"

# للاختبار المحلي: أضف السطر التالي واشغل npx decap-server
# local_backend: true

collections:
  - name: "nahw_lessons"
    label: "دروس في النحو"
    folder: "docs"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "عنوان الدرس", name: "title", widget: "string" }
      - { label: "تفعيل التشفير وحماية الصفحة", name: "encrypt", widget: "boolean", default: true }
      - { label: "محتوى الدرس", name: "body", widget: "markdown" }