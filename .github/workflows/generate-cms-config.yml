name: Generate CMS config

on:
  push:
    branches:
      - main
    paths:
      - 'docs/admin/subjects/*.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml
      - run: python scripts/generate_cms.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-generate CMS config from subjects [skip ci]"
          file_pattern: docs/admin/config.yml docs/*/index.md
