name: gh-deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: MkDocs Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install requirements
        run: |
          python --version
          pip --version
          pip install -r requirements.txt

      # بناء ملفات الموقع الثابتة داخل مجلد site دون عمل deploy يدوي
      - name: Build Site
        run: mkdocs build

      # رفع الملفات الناتجة كـ Artifact متوافق مع نظام GitHub الجديد
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      # الرفع النهائي المباشر إلى سيرفرات الاستضافة
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4