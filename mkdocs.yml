site_name: جمال خلف
site_url: https://gamalkhalaf.github.io/
site_author: جمال خلف

theme:
  name: material
  language: ar
  custom_dir: overrides
  hide:
    - generator
  
  # 1. تخصيص الألوان والوضع الليلي/النهاري
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: التبديل إلى الوضع المظلم
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: التبديل إلى الوضع الفاتح

  # 2. ميزات الواجهة والتنقل الاحترافي
  features:
    - navigation.tabs          # تحويل القائمة الجانبية إلى تبويبات علوية أنيقة
    - navigation.sections      # تنظيم المحتوى في أقسام واضحة
    - navigation.top           # زر العودة إلى الأعلى عند التمرير لأسفل
    - navigation.tracking      # تحديث الرابط تلقائياً أثناء التمرير لقراءة الدرس
    - search.suggest           # إظهار اقتراحات ذكية أثناء البحث
    - search.highlight         # تظليل الكلمات المبحوث عنها في النص
    - content.code.copy        # إضافة زر نسخ الأكواد/الأمثلة بسهولة

  # 3. الخطوط (اختيار خطوط تدعم العربية بشكل ممتاز)
  font:
    text: Cairo
    code: Roboto Mono

plugins:
  - search
  - encryptcontent

hooks:
  - hooks/generate_nav.py

# 4. إضافات الماركداون لتحسين عرض النصوص والشروحات
markdown_extensions:
  - admonition                 # صناديق الملاحظات والتنبيهات (ممتازة للقواعد النحوية)
  - pymdownx.details           # قوائم منسدلة لإخفاء وإظهار الإجابات/الأسئلة
  - pymdownx.superfences       # تحسين عرض الأكواد البرمجية والأمثلة
  - pymdownx.tabbed:           # تبويبات داخل الصفحة (مثلاً: أمثلة / إعراب)
      alternate_style: true
  - attr_list                  # لتخصيص الألوان والأحجام لبعض الكلمات تلقائياً

# 5. ربط سكربت الجافا سكريبت الذكي لحماية الصفحات بكلمة مرور
extra_javascript:
  - javascripts/lock.js
  

# nav: auto-generated by hooks/generate_nav.py